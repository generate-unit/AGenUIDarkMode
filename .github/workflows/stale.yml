name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 02:00 UTC

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 60
          days-before-close: 14
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity for 60 days. It will be closed in 14 days if no further
            activity occurs. If this issue is still relevant, please leave a comment
            or remove the stale label. Thank you for your contributions to AGenUI!
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            recent activity for 60 days. It will be closed in 14 days if no further
            activity occurs. If this PR is still in progress, please leave a comment
            or remove the stale label.
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'pinned,roadmap,good first issue'
          exempt-pr-labels: 'pinned,work-in-progress'
          remove-stale-when-updated: true
          operations-per-run: 100
