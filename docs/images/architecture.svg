<?xml version="1.0" encoding="UTF-8"?>
<!--
  AGenUI Architecture — Unified Style (AMap Blue Light)
  Layout: aligned with Aurora edition (3×3 flat grid, 9 modules with icons)
  Background : #F4F7FB
  Brand      : AMap blue #0091FF / #0073E6 / #4DB5FF
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 780" width="1400" height="780">
  <defs>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0091FF" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0073E6" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="cardFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="sectionFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-30%" width="120%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#0091FF" flood-opacity="0.12"/>
    </filter>
    <filter id="heroGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#0091FF" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect width="1400" height="780" fill="#F4F7FB"/>

  <!-- ============ Title ============ -->
  <g font-family="Inter, -apple-system, sans-serif" text-anchor="middle">
    <text x="700" y="58" font-size="28" font-weight="800" fill="#0F172A" letter-spacing="0.5">AGenUI Architecture</text>
  </g>

  <!-- ============ LAYER 1 · Native Renderers ============ -->
  <g font-family="Inter, -apple-system, sans-serif">
    <text x="80" y="96" font-size="13" fill="#0073E6" letter-spacing="3" font-weight="700">NATIVE CATALOG COMPONENTS</text>
    <text x="1320" y="96" text-anchor="end" font-size="12" font-weight="500" fill="#64748B">
      100% native · single-layer component · no WebView
    </text>

    <rect x="80" y="110" width="1240" height="100" rx="12" fill="url(#sectionFill)" stroke="#DCE7F2" stroke-width="1"/>

    <g transform="translate(100,129)" filter="url(#cardShadow)">
      <rect width="393" height="62" rx="10" fill="url(#cardFill)" stroke="#DCE7F2" stroke-width="1"/>
      <text x="20" y="30" font-size="17" font-weight="700" fill="#0F172A">iOS</text>
      <line x1="20" y1="40" x2="373" y2="40" stroke="#DCE7F2" stroke-width="0.8"/>
      <text x="20" y="56" font-size="13" fill="#64748B">UIKit · Swift · UIView</text>
    </g>

    <g transform="translate(503,129)" filter="url(#cardShadow)">
      <rect width="394" height="62" rx="10" fill="url(#cardFill)" stroke="#DCE7F2" stroke-width="1"/>
      <text x="20" y="30" font-size="17" font-weight="700" fill="#0F172A">Android</text>
      <line x1="20" y1="40" x2="374" y2="40" stroke="#DCE7F2" stroke-width="0.8"/>
      <text x="20" y="56" font-size="13" fill="#64748B">View System · Java · View</text>
    </g>

    <g transform="translate(907,129)" filter="url(#cardShadow)">
      <rect width="393" height="62" rx="10" fill="url(#cardFill)" stroke="#DCE7F2" stroke-width="1"/>
      <text x="20" y="30" font-size="17" font-weight="700" fill="#0F172A">HarmonyOS</text>
      <line x1="20" y1="40" x2="373" y2="40" stroke="#DCE7F2" stroke-width="0.8"/>
      <text x="20" y="56" font-size="13" fill="#64748B">ArkUI · ArkTS</text>
    </g>
  </g>

  <!-- ============ LAYER 2 · Bridge ============ -->
  <g font-family="Inter, -apple-system, sans-serif">
    <text x="80" y="250" font-size="13" fill="#0073E6" letter-spacing="3" font-weight="700">BRIDGE</text>
    <text x="1320" y="250" text-anchor="end" font-size="12" font-weight="500" fill="#64748B">
      translates only — zero business logic
    </text>

    <rect x="80" y="264" width="1240" height="42" rx="21" fill="url(#sectionFill)" stroke="#DCE7F2" stroke-width="1"/>

    <g transform="translate(217,274)">
      <text x="0" y="20" font-size="15" fill="#94A3B8">iOS</text>
      <text x="44" y="20" font-size="15" font-weight="700" fill="#0F172A">Objective-C++</text>
    </g>
    <line x1="493" y1="278" x2="493" y2="292" stroke="#DCE7F2" stroke-width="0.8"/>

    <g transform="translate(654,274)">
      <text x="0" y="20" font-size="15" fill="#94A3B8">Android</text>
      <text x="78" y="20" font-size="15" font-weight="700" fill="#0F172A">JNI</text>
    </g>
    <line x1="906" y1="278" x2="906" y2="292" stroke="#DCE7F2" stroke-width="0.8"/>

    <g transform="translate(1049,274)">
      <text x="0" y="20" font-size="15" fill="#94A3B8">HarmonyOS</text>
      <text x="106" y="20" font-size="15" font-weight="700" fill="#0F172A">NAPI</text>
    </g>
  </g>

  <!-- ============ LAYER 3 · Shared C++ Core (HERO) ============ -->
  <g font-family="Inter, -apple-system, sans-serif">
    <text x="80" y="346" font-size="13" fill="#0073E6" letter-spacing="3" font-weight="700">SHARED C++ CORE</text>
    <text x="1320" y="346" text-anchor="end" font-size="12" font-weight="500" fill="#64748B">
      one codebase, three platforms — 9 modules
    </text>

    <rect x="80" y="360" width="1240" height="376" rx="16"
          fill="url(#coreGrad)" stroke="#0091FF" stroke-width="1.4" filter="url(#heroGlow)"/>
    <rect x="86" y="366" width="1228" height="364" rx="12"
          fill="none" stroke="#4DB5FF" stroke-width="0.5" opacity="0.4"/>

    <!-- Color palette for icons:
         col1 → AMap blue   #0091FF
         col2 → deep blue   #0073E6
         col3 → light blue  #4DB5FF
    -->

    <!-- ─── Row 1 ─── -->
    <!-- Stream Processor -->
    <g transform="translate(100,388)" filter="url(#cardShadow)">
      <rect width="388" height="96" rx="10" fill="url(#cardFill)" stroke="#DCE7F2" stroke-width="1"/>
      <rect x="16" y="18" width="60" height="60" rx="10" fill="#0091FF" fill-opacity="0.10" stroke="#0091FF" stroke-width="1.2"/>
      <path d="M 28 48 Q 36 38, 44 48 T 60 48" fill="none" stroke="#0091FF" stroke-width="2" stroke-linecap="round"/>
      <path d="M 28 56 Q 36 46, 44 56 T 60 56" fill="none" stroke="#0091FF" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
      <text x="92" y="44" font-size="17" font-weight="700" fill="#0F172A">Stream Processor</text>
      <text x="92" y="66" font-size="13" fill="#64748B">partial JSON → live UI events</text>
    </g>

    <!-- A2UI Protocol Parser -->
    <g transform="translate(506,388)" filter="url(#cardShadow)">
      <rect width="388" height="96" rx="10" fill="url(#cardFill)" stroke="#DCE7F2" stroke-width="1"/>
      <rect x="16" y="18" width="60" height="60" rx="10" fill="#0073E6" fill-opacity="0.10" stroke="#0073E6" stroke-width="1.2"/>
      <path d="M 36 34 Q 28 34, 28 42 Q 28 48, 24 48 Q 28 48, 28 54 Q 28 62, 36 62" fill="none" stroke="#0073E6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 56 34 Q 64 34, 64 42 Q 64 48, 68 48 Q 64 48, 64 54 Q 64 62, 56 62" fill="none" stroke="#0073E6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="40" cy="48" r="1.6" fill="#0073E6"/>
      <circle cx="46" cy="48" r="1.6" fill="#0073E6"/>
      <circle cx="52" cy="48" r="1.6" fill="#0073E6"/>
      <text x="92" y="44" font-size="17" font-weight="700" fill="#0F172A">A2UI Protocol Parser</text>
      <text x="92" y="66" font-size="13" fill="#64748B">open standard decoder</text>
    </g>

    <!-- Virtual DOM -->
    <g transform="translate(912,388)" filter="url(#cardShadow)">
      <rect width="388" height="96" rx="10" fill="url(#cardFill)" stroke="#DCE7F2" stroke-width="1"/>
      <rect x="16" y="18" width="60" height="60" rx="10" fill="#4DB5FF" fill-opacity="0.13" stroke="#4DB5FF" stroke-width="1.2"/>
      <circle cx="46" cy="32" r="3" fill="#0073E6"/>
      <circle cx="32" cy="56" r="3" fill="#0073E6"/>
      <circle cx="46" cy="56" r="3" fill="#0073E6"/>
      <circle cx="60" cy="56" r="3" fill="#0073E6"/>
      <line x1="46" y1="35" x2="32" y2="53" stroke="#4DB5FF" stroke-width="1.4"/>
      <line x1="46" y1="35" x2="46" y2="53" stroke="#4DB5FF" stroke-width="1.4"/>
      <line x1="46" y1="35" x2="60" y2="53" stroke="#4DB5FF" stroke-width="1.4"/>
      <text x="92" y="44" font-size="17" font-weight="700" fill="#0F172A">Virtual DOM</text>
      <text x="92" y="66" font-size="13" fill="#64748B">incremental diffing</text>
    </g>

    <!-- ─── Row 2 ─── -->
    <!-- Component Manager -->
    <g transform="translate(100,504)" filter="url(#cardShadow)">
      <rect width="388" height="96" rx="10" fill="url(#cardFill)" stroke="#DCE7F2" stroke-width="1"/>
      <rect x="16" y="18" width="60" height="60" rx="10" fill="#0091FF" fill-opacity="0.10" stroke="#0091FF" stroke-width="1.2"/>
      <rect x="28" y="32" width="22" height="22" rx="3" fill="none" stroke="#0091FF" stroke-width="1.6"/>
      <rect x="38" y="42" width="22" height="22" rx="3" fill="none" stroke="#0091FF" stroke-width="1.6"/>
      <text x="92" y="44" font-size="17" font-weight="700" fill="#0F172A">Component Manager</text>
      <text x="92" y="66" font-size="13" fill="#64748B">lifecycle &amp; expressions</text>
    </g>

    <!-- Layout -->
    <g transform="translate(506,504)" filter="url(#cardShadow)">
      <rect width="388" height="96" rx="10" fill="url(#cardFill)" stroke="#DCE7F2" stroke-width="1"/>
      <rect x="16" y="18" width="60" height="60" rx="10" fill="#0073E6" fill-opacity="0.10" stroke="#0073E6" stroke-width="1.2"/>
      <rect x="28" y="30" width="14" height="14" rx="2" fill="#0073E6" opacity="0.85"/>
      <rect x="46" y="30" width="14" height="14" rx="2" fill="none" stroke="#0073E6" stroke-width="1.4"/>
      <rect x="28" y="48" width="14" height="14" rx="2" fill="none" stroke="#0073E6" stroke-width="1.4"/>
      <rect x="46" y="48" width="14" height="14" rx="2" fill="#0073E6" opacity="0.5"/>
      <text x="92" y="44" font-size="17" font-weight="700" fill="#0F172A">Layout</text>
      <text x="92" y="66" font-size="13" fill="#64748B">Yoga · cross-platform Flexbox</text>
    </g>

    <!-- Data Model -->
    <g transform="translate(912,504)" filter="url(#cardShadow)">
      <rect width="388" height="96" rx="10" fill="url(#cardFill)" stroke="#DCE7F2" stroke-width="1"/>
      <rect x="16" y="18" width="60" height="60" rx="10" fill="#4DB5FF" fill-opacity="0.13" stroke="#4DB5FF" stroke-width="1.2"/>
      <ellipse cx="46" cy="32" rx="14" ry="4" fill="none" stroke="#0073E6" stroke-width="1.6"/>
      <line x1="32" y1="32" x2="32" y2="56" stroke="#0073E6" stroke-width="1.6"/>
      <line x1="60" y1="32" x2="60" y2="56" stroke="#0073E6" stroke-width="1.6"/>
      <path d="M 32 56 Q 46 60, 60 56" fill="none" stroke="#0073E6" stroke-width="1.6"/>
      <ellipse cx="46" cy="44" rx="14" ry="4" fill="none" stroke="#0073E6" stroke-width="1.2" opacity="0.6"/>
      <text x="92" y="44" font-size="17" font-weight="700" fill="#0F172A">Data Model</text>
      <text x="92" y="66" font-size="13" fill="#64748B">two-way binding</text>
    </g>

    <!-- ─── Row 3 ─── -->
    <!-- Design Token -->
    <g transform="translate(100,620)" filter="url(#cardShadow)">
      <rect width="388" height="96" rx="10" fill="url(#cardFill)" stroke="#DCE7F2" stroke-width="1"/>
      <rect x="16" y="18" width="60" height="60" rx="10" fill="#0091FF" fill-opacity="0.10" stroke="#0091FF" stroke-width="1.2"/>
      <circle cx="34" cy="38" r="6" fill="#0091FF"/>
      <circle cx="58" cy="38" r="6" fill="#4DB5FF"/>
      <circle cx="34" cy="58" r="6" fill="#0073E6"/>
      <circle cx="58" cy="58" r="6" fill="#FCD34D"/>
      <text x="92" y="44" font-size="17" font-weight="700" fill="#0F172A">Design Token</text>
      <text x="92" y="66" font-size="13" fill="#64748B">themeable token system</text>
    </g>

    <!-- Component Spec -->
    <g transform="translate(506,620)" filter="url(#cardShadow)">
      <rect width="388" height="96" rx="10" fill="url(#cardFill)" stroke="#DCE7F2" stroke-width="1"/>
      <rect x="16" y="18" width="60" height="60" rx="10" fill="#0073E6" fill-opacity="0.10" stroke="#0073E6" stroke-width="1.2"/>
      <rect x="30" y="28" width="26" height="32" rx="2" fill="none" stroke="#0073E6" stroke-width="1.6"/>
      <line x1="34" y1="36" x2="50" y2="36" stroke="#0073E6" stroke-width="1.4"/>
      <line x1="34" y1="42" x2="50" y2="42" stroke="#0073E6" stroke-width="1.4"/>
      <path d="M 36 50 L 40 54 L 50 46" fill="none" stroke="#0073E6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="92" y="44" font-size="17" font-weight="700" fill="#0F172A">Component Spec</text>
      <text x="92" y="66" font-size="13" fill="#64748B">property → style mapping</text>
    </g>

    <!-- Style Defaults -->
    <g transform="translate(912,620)" filter="url(#cardShadow)">
      <rect width="388" height="96" rx="10" fill="url(#cardFill)" stroke="#DCE7F2" stroke-width="1"/>
      <rect x="16" y="18" width="60" height="60" rx="10" fill="#4DB5FF" fill-opacity="0.13" stroke="#4DB5FF" stroke-width="1.2"/>
      <rect x="28" y="32" width="32" height="6" rx="1.5" fill="#0091FF" opacity="0.95"/>
      <rect x="28" y="42" width="32" height="6" rx="1.5" fill="#0091FF" opacity="0.65"/>
      <rect x="28" y="52" width="32" height="6" rx="1.5" fill="#0091FF" opacity="0.35"/>
      <text x="92" y="44" font-size="17" font-weight="700" fill="#0F172A">Style Defaults</text>
      <text x="92" y="66" font-size="13" fill="#64748B">base style fallback</text>
    </g>
  </g>
</svg>
